name: Deploy to S3
on:
  push:
    branches:
      - main
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check if package.json changed
        id: pkg_changed
        run: |
          if git diff --name-only HEAD~1 HEAD | grep -q "^package\.json$"; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Install dependencies
        if: steps.pkg_changed.outputs.changed == 'true'
        run: npm install --production

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Zip and upload to S3
        run: |
          zip -r deployment.zip . \
              --exclude ".git/*" \
              --exclude ".github/*" \
              --exclude ".env" \
              --exclude "*.log" \
              --exclude "*.md" \
              --exclude "*.csv"
          aws s3 cp deployment.zip s3://${{ secrets.S3_BUCKET_NAME }}/deployment.zip

      - name: Update Lambda from S3
        run: |
          aws lambda update-function-code \
            --function-name ${{ secrets.LAMBDA_FUNCTION_NAME }} \
            --s3-bucket ${{ secrets.S3_BUCKET_NAME }} \
            --s3-key deployment.zip
